<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Daily</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Daily">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#ffffff">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="daily.">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#ffffff">
<link rel="apple-touch-icon" id="appIcon">
<link rel="manifest" id="appManifest">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --white:#ffffff;
  --bg:#f9f9f9;
  --border:#efefef;
  --border2:#dbdbdb;
  --ink:#111111;
  --ink2:#262626;
  --ink3:#737373;
  --ink4:#a8a8a8;
  --purple:#7c4dbe;
  --purple-light:#e8dff7;
  --purple-mid:#c4a8ee;
  --purple-dark:#5b34a0;
  --purple-bg:#f5f0ff;
}
html,body{height:100%;background:var(--bg);color:var(--ink);font-family:'Plus Jakarta Sans',sans-serif;font-size:16px;-webkit-font-smoothing:antialiased}
.app{display:flex;flex-direction:column;min-height:100vh;min-height:100dvh;background:var(--white)}

/* ── Header ── */
.header{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;background:var(--white);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:20}
.header-logo{font-size:22px;font-weight:800;color:var(--ink);letter-spacing:-.03em}
.header-logo span{color:var(--purple)}
.header-date{font-size:12px;color:var(--ink3);font-weight:400}

/* ── Tab bar ── */
.tab-bar{display:flex;background:var(--white);border-bottom:1px solid var(--border);overflow-x:auto;-webkit-overflow-scrolling:touch;flex-shrink:0;position:sticky;top:53px;z-index:19;scrollbar-width:none}
.tab-bar::-webkit-scrollbar{display:none}
.tab-btn{padding:13px 16px;font-size:12px;font-family:'Plus Jakarta Sans',sans-serif;font-weight:500;background:none;border:none;border-bottom:2px solid transparent;cursor:pointer;color:var(--ink3);white-space:nowrap;flex-shrink:0;transition:all .15s;letter-spacing:.01em}
.tab-btn.active{color:var(--purple);border-bottom-color:var(--purple);font-weight:700}

/* ── Feed body ── */
.feed{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;background:var(--bg)}
.feed-inner{max-width:600px;margin:0 auto;padding:12px 0 60px}

/* ── Post card (Instagram-style) ── */
.post{background:var(--white);margin-bottom:8px;border-top:1px solid var(--border);border-bottom:1px solid var(--border)}
.post-header{display:flex;align-items:center;gap:10px;padding:12px 16px}
.post-avatar{width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,var(--purple-mid),var(--purple));display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;color:#fff;flex-shrink:0}
.post-title{font-size:14px;font-weight:700;color:var(--ink2)}
.post-sub{font-size:12px;color:var(--ink3);margin-top:1px}
.post-body{padding:0 16px 16px}

/* ── Wins checklist ── */
.wins-list{display:flex;flex-direction:column;gap:6px;margin-bottom:12px}
.win-row{display:flex;align-items:center;gap:12px;padding:12px 14px;background:var(--bg);border-radius:12px;cursor:pointer;transition:background .12s;touch-action:manipulation}
.win-row.checked{background:var(--purple-bg)}
.win-circle{width:22px;height:22px;border-radius:50%;border:2px solid var(--border2);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:11px;color:#fff;transition:all .2s}
.win-row.checked .win-circle{background:var(--purple);border-color:var(--purple)}
.win-text{font-size:14px;color:var(--ink2);font-weight:500;flex:1}
.win-row.checked .win-text{color:var(--purple)}
.add-win-row{display:flex;gap:8px;margin-top:4px}
.add-win-inp{flex:1;padding:11px 14px;font-size:14px;font-family:'Plus Jakarta Sans',sans-serif;border:1.5px solid var(--border2);border-radius:12px;background:var(--white);color:var(--ink);outline:none}
.add-win-inp:focus{border-color:var(--purple-mid)}
.add-win-inp::placeholder{color:var(--ink4)}
.add-win-btn{padding:11px 16px;font-size:13px;font-family:'Plus Jakarta Sans',sans-serif;font-weight:700;background:var(--purple);color:#fff;border:none;border-radius:12px;cursor:pointer;touch-action:manipulation}

/* ── Priority block ── */
.priority-block{background:var(--purple-bg);border-radius:14px;padding:16px;margin-bottom:8px}
.block-label{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--purple);margin-bottom:6px}
.block-prompt{font-size:14px;color:var(--ink3);margin-bottom:10px;line-height:1.5;font-weight:400}
.ta{width:100%;padding:12px 14px;font-size:15px;font-family:'Plus Jakarta Sans',sans-serif;line-height:1.6;border:1.5px solid var(--border2);border-radius:12px;background:var(--white);color:var(--ink);outline:none;resize:none;transition:border-color .2s}
.ta:focus{border-color:var(--purple-mid)}
.ta::placeholder{color:var(--ink4)}

/* ── Action rows ── */
.action-rows{display:flex;flex-direction:column;gap:8px}
.action-row{display:flex;align-items:center;gap:10px}
.action-num{width:28px;height:28px;border-radius:50%;background:var(--purple);color:#fff;font-size:13px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.action-inp{flex:1;padding:11px 14px;font-size:14px;font-family:'Plus Jakarta Sans',sans-serif;border:1.5px solid var(--border2);border-radius:12px;background:var(--bg);color:var(--ink);outline:none;transition:border-color .2s;min-width:0}
.action-inp:focus{border-color:var(--purple-mid);background:var(--white)}
.action-inp::placeholder{color:var(--ink4)}

/* ── Mindset block ── */
.mindset-block{background:var(--bg);border-radius:14px;padding:16px;margin-bottom:10px}
.mindset-prompt{font-size:15px;font-weight:700;color:var(--ink2);margin-bottom:4px}
.mindset-prefix{font-size:13px;color:var(--ink3);margin-bottom:8px}

/* ── Primary button ── */
.primary-btn{width:100%;padding:15px;font-size:15px;font-family:'Plus Jakarta Sans',sans-serif;font-weight:700;background:var(--purple);color:#fff;border:none;border-radius:14px;cursor:pointer;touch-action:manipulation;margin-top:4px;letter-spacing:.01em}
.primary-btn:active{opacity:.85}
.save-confirm{font-size:13px;color:var(--purple);text-align:center;opacity:0;transition:opacity .4s;margin-top:8px;font-weight:500}

/* ── Relationships tab ── */
.contact-list{display:flex;flex-direction:column;gap:8px;margin-bottom:12px}
.contact-card{background:var(--bg);border-radius:14px;border:1.5px solid var(--border);padding:14px 16px;display:flex;align-items:center;gap:12px}
.contact-card.overdue{border-color:#f0a0a0;background:#fff5f5}
.contact-avatar{width:42px;height:42px;border-radius:50%;background:var(--purple);color:#fff;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:700;flex-shrink:0}
.contact-info{flex:1;min-width:0}
.contact-name{font-size:15px;font-weight:700;color:var(--ink2)}
.contact-freq{font-size:12px;color:var(--ink3);margin-top:2px}
.contact-due{font-size:11px;font-weight:600;color:#d04040;margin-top:2px}
.contact-actions{display:flex;gap:6px;flex-shrink:0}
.contact-btn{padding:7px 12px;font-size:12px;font-family:'Plus Jakarta Sans',sans-serif;font-weight:600;border:none;border-radius:8px;cursor:pointer;touch-action:manipulation;background:var(--purple);color:#fff}
.contact-del-btn{background:none;border:1.5px solid var(--border2);color:var(--ink3);padding:7px 10px;font-size:12px;border-radius:8px;cursor:pointer;touch-action:manipulation;font-family:'Plus Jakarta Sans',sans-serif}
.rel-prompts{display:flex;flex-direction:column;gap:8px;margin-bottom:4px}
.rel-prompt{background:var(--purple-bg);border-radius:12px;padding:12px 14px;font-size:13px;color:var(--purple-dark);font-weight:500;line-height:1.5;font-style:italic}
.kind-types{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
.kind-type-btn{padding:11px 10px;font-size:12px;font-weight:600;font-family:'Plus Jakarta Sans',sans-serif;border:1.5px solid var(--border2);border-radius:10px;background:var(--bg);cursor:pointer;touch-action:manipulation;color:var(--ink2);text-align:center;transition:all .15s;line-height:1.3}
.kind-type-btn.kind-sel{background:var(--purple-bg);border-color:var(--purple);color:var(--purple)}
.kind-preview{background:var(--purple-bg);border-radius:12px;padding:16px;font-size:14px;color:var(--ink2);line-height:1.7;font-style:italic;margin-bottom:12px;min-height:60px}
.send-options{display:flex;gap:8px}
.send-sms-btn{flex:1;padding:13px;font-size:14px;font-family:'Plus Jakarta Sans',sans-serif;font-weight:700;background:var(--purple);color:#fff;border:none;border-radius:12px;cursor:pointer;touch-action:manipulation}
.send-email-btn{flex:1;padding:13px;font-size:14px;font-family:'Plus Jakarta Sans',sans-serif;font-weight:700;background:var(--ink2);color:#fff;border:none;border-radius:12px;cursor:pointer;touch-action:manipulation}
.thinking-card{background:linear-gradient(135deg,var(--purple-bg),#f0f7f0);border-radius:14px;border:1.5px solid var(--purple-mid);padding:18px;margin-bottom:10px}

/* ── Emotional tracker ── */
.mood-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:4px}
.mood-btn{display:flex;flex-direction:column;align-items:center;gap:4px;padding:10px 6px;border-radius:12px;border:1.5px solid var(--border);background:var(--bg);cursor:pointer;touch-action:manipulation;transition:all .15s}
.mood-btn.mood-sel{border-color:var(--purple);background:var(--purple-bg)}
.mood-emoji{font-size:22px;line-height:1}
.mood-label{font-size:10px;font-weight:600;color:var(--ink3);letter-spacing:.03em}
.mood-btn.mood-sel .mood-label{color:var(--purple)}
.energy-dots{display:flex;gap:6px;flex-wrap:wrap}
.e-dot{width:34px;height:34px;border-radius:50%;border:1.5px solid var(--border2);background:var(--bg);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:var(--ink3);transition:all .15s;touch-action:manipulation}
.e-dot.e-dot-sel{background:var(--purple);border-color:var(--purple);color:#fff}

/* ── Workout plan cards ── */
.plans-list{display:flex;flex-direction:column;gap:8px}
.plan-card{background:var(--bg);border-radius:14px;border:1.5px solid var(--border);overflow:hidden;cursor:pointer;transition:border-color .15s}
.plan-card.plan-open{border-color:var(--purple)}
.plan-card-head{display:flex;align-items:center;gap:12px;padding:14px 16px}
.plan-emoji{font-size:24px;flex-shrink:0}
.plan-title{font-size:15px;font-weight:700;color:var(--ink2)}
.plan-tag{font-size:12px;color:var(--ink3);margin-top:2px}
.plan-chevron{font-size:11px;color:var(--ink4);flex-shrink:0}
.plan-body{padding:0 16px 12px;font-size:13px;color:var(--ink2);line-height:1.8;white-space:pre-wrap;font-family:monospace;background:var(--white);border-top:1px solid var(--border)}
.plan-use-btn{display:block;width:calc(100% - 32px);margin:0 16px 14px;padding:12px;font-size:13px;font-family:'Plus Jakarta Sans',sans-serif;font-weight:700;background:var(--purple);color:#fff;border:none;border-radius:10px;cursor:pointer;touch-action:manipulation}

/* ── Exercise tab ── */
.week-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:16px}
.day-pill{display:flex;flex-direction:column;align-items:center;gap:4px;padding:8px 4px;border-radius:10px;border:1.5px solid var(--border2);background:var(--bg);cursor:pointer;touch-action:manipulation;transition:all .15s}
.day-pill.weights{background:var(--purple-bg);border-color:var(--purple-mid)}
.day-pill.cardio{background:#e8f4ff;border-color:#90c4f0}
.day-pill.rest{background:#f0f7f0;border-color:#a8d4a8}
.day-pill.active-day{box-shadow:0 0 0 2px var(--purple)}
.day-name{font-size:9px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--ink3)}
.day-type{font-size:9px;font-weight:600;color:var(--ink3)}
.day-pill.weights .day-type{color:var(--purple)}
.day-pill.cardio .day-type{color:#2196f3}
.day-pill.rest .day-type{color:#4caf50}
.type-selector{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px}
.type-opt{padding:7px 14px;font-size:12px;font-weight:600;font-family:'Plus Jakarta Sans',sans-serif;border:1.5px solid var(--border2);border-radius:99px;background:var(--bg);cursor:pointer;touch-action:manipulation;color:var(--ink3);transition:all .15s}
.type-opt.sel-weights{background:var(--purple-bg);border-color:var(--purple);color:var(--purple)}
.type-opt.sel-cardio{background:#e8f4ff;border-color:#2196f3;color:#2196f3}
.type-opt.sel-rest{background:#f0f7f0;border-color:#4caf50;color:#4caf50}

/* ── Nourishment tab ── */
.water-tracker{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:8px}
.glass{width:38px;height:48px;border-radius:6px 6px 10px 10px;border:2px solid var(--border2);background:var(--bg);cursor:pointer;touch-action:manipulation;transition:all .2s;display:flex;align-items:flex-end;overflow:hidden;position:relative}
.glass.filled{border-color:#2196f3}
.glass-fill{width:100%;background:linear-gradient(180deg,#64b5f6,#1976d2);border-radius:0 0 8px 8px;transition:height .3s;height:0}
.glass.filled .glass-fill{height:100%}
.water-count{font-size:13px;font-weight:700;color:#2196f3;margin-top:8px;margin-bottom:4px}
.vitamin-list{display:flex;flex-direction:column;gap:6px;margin-bottom:4px}
.vitamin-row{display:flex;align-items:center;gap:10px;padding:10px 12px;background:var(--bg);border-radius:10px;cursor:pointer;touch-action:manipulation;transition:background .12s}
.vitamin-row.checked{background:#f5f0ff}
.vitamin-check{width:20px;height:20px;border-radius:50%;border:1.5px solid var(--border2);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:10px;color:#fff;transition:all .2s}
.vitamin-row.checked .vitamin-check{background:var(--purple);border-color:var(--purple)}
.vitamin-name{font-size:14px;font-weight:500;color:var(--ink2)}
.vitamin-row.checked .vitamin-name{color:var(--purple)}
.meal-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px}
.meal-slot{background:var(--bg);border-radius:10px;padding:10px 12px;border:1.5px solid var(--border)}
.meal-slot-label{font-size:10px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--ink3);margin-bottom:4px}
.meal-inp{width:100%;font-size:13px;font-family:'Plus Jakarta Sans',sans-serif;border:none;background:transparent;color:var(--ink2);outline:none;padding:0}
.meal-inp::placeholder{color:var(--ink4)}
.meal-suggestions{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:8px}
.meal-chip{padding:6px 12px;font-size:12px;font-weight:500;font-family:'Plus Jakarta Sans',sans-serif;background:var(--purple-bg);border:none;border-radius:99px;color:var(--purple-dark);cursor:pointer;touch-action:manipulation}

/* ── Financial tab ── */
.savings-goal-card{background:#f5f5f5;border-radius:14px;padding:18px;margin-bottom:10px;border:1px solid #e0e0e0}
.savings-progress-bar{height:8px;background:var(--purple-light);border-radius:99px;overflow:hidden;margin:10px 0 4px}
.savings-progress-fill{height:100%;background:var(--purple);border-radius:99px;transition:width .4s}
.savings-amounts{display:flex;justify-content:space-between;font-size:12px;color:var(--ink3);font-weight:500}
.desire-card{background:var(--purple-bg);border:1.5px solid var(--purple-mid);border-radius:14px;padding:16px;margin-bottom:10px}
.desire-label{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--purple);margin-bottom:6px}
.category-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px}
.cat-card{background:var(--bg);border-radius:12px;padding:12px;border:1.5px solid var(--border)}
.cat-name{font-size:11px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;color:var(--ink3);margin-bottom:4px}
.cat-amount{font-size:20px;font-weight:800;color:var(--ink2)}
.cat-add{display:flex;gap:6px;margin-top:8px}
.cat-add-inp{flex:1;padding:7px 10px;font-size:13px;font-family:'Plus Jakarta Sans',sans-serif;border:1.5px solid var(--border2);border-radius:8px;background:var(--white);color:var(--ink);outline:none;min-width:0}
.cat-add-btn{padding:7px 12px;font-size:12px;font-family:'Plus Jakarta Sans',sans-serif;font-weight:700;background:var(--purple);color:#fff;border:none;border-radius:8px;cursor:pointer;touch-action:manipulation}
.spend-total{text-align:right;font-size:13px;font-weight:700;color:var(--ink3);margin-bottom:12px}
.spend-total span{color:var(--purple);font-size:16px}

/* ── Log entries (past) ── */
.past-label{font-size:12px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--ink3);padding:14px 16px 8px}
.log-entry{background:var(--white);border-top:1px solid var(--border);padding:14px 16px}
.log-date{font-size:11px;color:var(--ink4);font-weight:600;margin-bottom:6px;letter-spacing:.04em;text-transform:uppercase}
.log-text{font-size:14px;color:var(--ink2);line-height:1.65}
.log-foot{display:flex;justify-content:flex-end;margin-top:10px}
.del-btn{background:none;border:none;font-size:12px;color:var(--ink4);cursor:pointer;font-family:'Plus Jakarta Sans',sans-serif;font-weight:500;touch-action:manipulation}

/* ── Empty state ── */
.empty-state{text-align:center;padding:60px 24px}
.empty-icon{font-size:40px;margin-bottom:14px}
.empty-title{font-size:17px;font-weight:700;color:var(--ink2);margin-bottom:6px}
.empty-sub{font-size:14px;color:var(--ink3);line-height:1.6}

/* ── Journal prompts ── */
.prompts-scroll{display:flex;flex-direction:column;gap:8px;margin-bottom:14px}
.prompt-chip{background:var(--purple-bg);border:none;border-radius:12px;padding:12px 14px;font-size:13px;color:var(--purple-dark);cursor:pointer;touch-action:manipulation;text-align:left;font-family:'Plus Jakarta Sans',sans-serif;font-weight:500;line-height:1.4;width:100%}
.prompt-chip:active{background:var(--purple-light)}

/* ── Inspire ── */
.quote-wrap{padding:24px 16px}
.quote-card{background:var(--white);border-radius:20px;padding:32px 24px;text-align:center;border:1px solid var(--border);margin-bottom:20px;box-shadow:0 2px 20px rgba(124,77,190,.08)}
.quote-mark{font-size:40px;color:var(--purple-mid);line-height:1;margin-bottom:12px}
.quote-text{font-size:19px;font-weight:500;color:var(--ink2);line-height:1.6;margin-bottom:18px;letter-spacing:-.01em}
.quote-author{font-size:12px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--ink3)}
.new-quote-btn{display:flex;align-items:center;justify-content:center;gap:8px;margin:0 auto;padding:13px 28px;font-size:14px;font-family:'Plus Jakarta Sans',sans-serif;font-weight:700;background:var(--purple);color:#fff;border:none;border-radius:99px;cursor:pointer;touch-action:manipulation}
/* ── Modal ── */
.modal-title{font-size:18px;font-weight:700;color:var(--ink);margin-bottom:16px}
.modal-footer{display:flex;gap:10px;margin-top:16px}
.modal-cancel{flex:1;padding:13px;font-size:14px;font-family:'Plus Jakarta Sans',sans-serif;background:none;border:1.5px solid var(--border2);border-radius:10px;cursor:pointer;color:var(--ink2)}
.modal-save{flex:2;padding:13px;font-size:14px;font-family:'Plus Jakarta Sans',sans-serif;font-weight:700;background:var(--purple);color:#fff;border:none;border-radius:10px;cursor:pointer}
.mi-ta{width:100%;padding:11px 13px;font-size:14px;font-family:'Plus Jakarta Sans',sans-serif;line-height:1.6;border:1.5px solid var(--border2);border-radius:10px;background:#fff;color:var(--ink);outline:none;resize:vertical;min-height:80px}
.fg{margin-bottom:12px}
.lbl{display:block;font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--ink3);margin-bottom:6px}
.modal-handle{width:36px;height:4px;background:var(--border2);border-radius:99px;margin:0 auto 18px}
/* ── Relationships tab ── */
.contact-item{display:flex;align-items:center;gap:12px;background:var(--white);border:1px solid var(--border);border-radius:12px;padding:12px 14px;margin-bottom:8px}

<body>

<div class="app">

  <div class="header">
    <div class="header-logo">daily<span>.</span></div>
    <div style="display:flex;align-items:center;gap:10px">
      <div class="header-date" id="headerDate"></div>
    </div>
  </div>

  <div class="tab-bar">
    <button class="tab-btn active" onclick="switchTab('daily',this)">Daily</button>
    <button class="tab-btn" onclick="switchTab('exercise',this)">Exercise</button>
    <button class="tab-btn" onclick="switchTab('nourish',this)">Nourishment</button>
    <button class="tab-btn" onclick="switchTab('emotional',this)">Emotions</button>
    <button class="tab-btn" onclick="switchTab('relationships',this)">Relationships</button>
    <button class="tab-btn" onclick="switchTab('financial',this)">Money</button>
    <button class="tab-btn" onclick="switchTab('journal',this)">Journal</button>
    <button class="tab-btn" onclick="switchTab('evening',this)">Evening</button>
    <button class="tab-btn" onclick="switchTab('inspire',this)">Inspire</button>
  </div>

  <div class="feed">
    <div class="feed-inner" id="viewBody"></div>
  </div>

</div>

<script>

const DB_KEY='daily_v1';
let curTab='daily';
let DEFAULT_WINS=['Made my bed','Got dressed intentionally','Read / meditate','Movement / exercise','Ate something nourishing'];
let wins=[...DEFAULT_WINS];
let checkedWins=new Set();
let actions=['','',''];
let DB={};
let currentQuote=null;

function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
function today(){return new Date().toISOString().slice(0,10)}
function fmtFull(iso){if(!iso)return'';const d=new Date(iso+'T12:00:00');return d.toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric'})}
function fmtShort(iso){if(!iso)return'';const d=new Date(iso+'T12:00:00');return d.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}).toUpperCase()}

function loadDB(){try{DB=JSON.parse(localStorage.getItem(DB_KEY)||'{}');wins=DB.wins||[...DEFAULT_WINS];}catch(e){DB={};wins=[...DEFAULT_WINS];}}
function saveDB(key,value){DB[key]=value;localStorage.setItem(DB_KEY,JSON.stringify(DB));}
function save(){saveDB('wins',wins);}

// Init
loadDB();
document.getElementById('headerDate').textContent=fmtFull(today());
// renderTab called after all functions loaded (see bottom of script)

// LEGACY (unused) — works everywhere, no server needed) ──



function switchTab(tab,btn){
  curTab=tab;
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  btn.scrollIntoView({inline:'center',behavior:'smooth'});
  renderTab();
}

function renderTab(){
  if(curTab==='daily') renderDaily();
  else if(curTab==='emotional') renderEmotional();
  else if(curTab==='relationships') renderRelationships();
  else if(curTab==='exercise') renderExercise();
  else if(curTab==='nourish') renderNourish();
  else if(curTab==='financial') renderFinancial();
  else if(curTab==='journal') renderJournal();
  else if(curTab==='evening') renderEvening();
  else renderInspire();
}

// ═══════════════ DAILY ═══════════════
function renderDaily(){
  document.getElementById('viewBody').innerHTML=`

    <div class="post">
      <div class="post-header">
        <div class="post-avatar">☀️</div>
        <div>
          <div class="post-title">Morning wins</div>
          <div class="post-sub">How did you win this morning?</div>
        </div>
      </div>
      <div class="post-body">
        <div class="wins-list" id="winsList"></div>
        <div class="add-win-row">
          <input class="add-win-inp" id="customWinInp" placeholder="Add your own win…" onkeydown="if(event.key==='Enter')addCustomWin()">
          <button class="add-win-btn" onclick="addCustomWin()">+</button>
        </div>
      </div>
    </div>

    <div class="post">
      <div class="post-header">
        <div class="post-avatar">🎯</div>
        <div>
          <div class="post-title">The priority</div>
          <div class="post-sub">The one thing I've been avoiding</div>
        </div>
      </div>
      <div class="post-body">
        <div class="priority-block">
          <div class="block-prompt">The one thing I've been avoiding that will move me forward the most…</div>
          <textarea class="ta" id="inp_priority" placeholder="Be honest with yourself…" rows="2"></textarea>
        </div>
      </div>
    </div>

    <div class="post">
      <div class="post-header">
        <div class="post-avatar">⚡</div>
        <div>
          <div class="post-title">Top 3 actions</div>
          <div class="post-sub">What moves you closer to your goals today?</div>
        </div>
      </div>
      <div class="post-body">
        <div class="action-rows" id="actionRows"></div>
      </div>
    </div>

    <div class="post">
      <div class="post-header">
        <div class="post-avatar">✨</div>
        <div>
          <div class="post-title">Mindset</div>
          <div class="post-sub">How you show up & how you give</div>
        </div>
      </div>
      <div class="post-body">
        <div class="mindset-block">
          <div class="mindset-prompt">How do I want to show up today?</div>
          <div class="mindset-prefix">I want to be someone who…</div>
          <textarea class="ta" id="inp_showup" placeholder="…shows up fully, leads with love, moves with intention" rows="2"></textarea>
        </div>
        <div style="height:10px"></div>
        <div class="mindset-block">
          <div class="mindset-prompt">How can I add more value to others?</div>
          <div class="mindset-prefix">Today I will…</div>
          <textarea class="ta" id="inp_value" placeholder="…listen deeply, encourage someone, share what I know" rows="2"></textarea>
        </div>
        <div style="height:4px"></div>
        <button class="primary-btn" onclick="saveDaily()">Save today's entry</button>
        <div class="save-confirm" id="saveConfirm">You're doing great ✦</div>
      </div>
    </div>`;

  renderWins();
  renderActions();
}

function renderWins(){
  const el=document.getElementById('winsList');if(!el)return;
  el.innerHTML=wins.map((w,i)=>`
    <div class="win-row${checkedWins.has(i)?' checked':''}" onclick="toggleWin(${i})">
      <div class="win-circle">${checkedWins.has(i)?'✓':''}</div>
      <div class="win-text">${esc(w)}</div>
    </div>`).join('');
}

function toggleWin(i){
  if(checkedWins.has(i))checkedWins.delete(i);else checkedWins.add(i);
  renderWins();
}

function addCustomWin(){
  const inp=document.getElementById('customWinInp');
  const val=(inp.value||'').trim();if(!val)return;
  wins.push(val);saveDB('wins',wins);inp.value='';renderWins();
}

function renderActions(){
  const el=document.getElementById('actionRows');if(!el)return;
  el.innerHTML=actions.map((a,i)=>`
    <div class="action-row">
      <div class="action-num">${i+1}</div>
      <input class="action-inp" type="text" value="${esc(a)}" placeholder="Action ${i+1}…" oninput="actions[${i}]=this.value">
    </div>`).join('');
}

function saveDaily(){
  const priority=(document.getElementById('inp_priority').value||'').trim();
  const showup=(document.getElementById('inp_showup').value||'').trim();
  const value=(document.getElementById('inp_value').value||'').trim();
  const actionList=actions.filter(a=>a.trim());
  const winsChecked=Array.from(checkedWins).map(i=>wins[i]);
  if(!priority&&!showup&&!value&&!actionList.length&&!winsChecked.length)return;
  if(!DB.dailyLog)DB.dailyLog=[];
  DB.dailyLog.unshift({id:Date.now().toString(),date:today(),wins:winsChecked,priority,actions:actionList,showup,value});
  saveDB('dailyLog',DB.dailyLog);
  const conf=document.getElementById('saveConfirm');
  conf.style.opacity='1';setTimeout(()=>{conf.style.opacity='0';},2600);
  checkedWins=new Set();actions=['','',''];
  ['inp_priority','inp_showup','inp_value'].forEach(id=>{const el=document.getElementById(id);if(el)el.value='';});
  renderWins();renderActions();
}

// ═══════════════ EXERCISE ═══════════════
const DAYS=['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
const WORKOUT_TYPES=['weights','cardio','rest','off'];

const WORKOUT_PLANS=[
  {
    id:'full_body_weights',
    emoji:'🔥',
    title:'Full Body Weights',
    tag:'30–40 min · 3–4x/week',
    type:'weights',
    content:`🔥 Full Body Workout (30–40 min, 3–4x/week)

Structure:
• 5 exercises · 3 rounds · 10–15 reps each · Minimal rest (30–60 sec)

─────────────────────────
🧠 ROUND 1: Lower Body + Power

1. Goblet Squats (35 lb kettlebell)
   • Hold KB at chest · Sit low, chest up
   • 12–15 reps
   👉 Main strength move. Don't rush it.

2. Romanian Deadlifts (15 lb dumbbells)
   • Slight bend in knees · Push hips back
   • Feel stretch in hamstrings · 10–12 reps
   👉 Builds shape in glutes/hamstrings.

─────────────────────────
🧠 ROUND 2: Upper Body Strength

3. Shoulder Press (8 or 15 lb dumbbells)
   • Core tight · Press straight up · 10–12 reps
   👉 Use 8s if 15 is too heavy. Form > weight.

4. Bent Over Rows (15 lb dumbbells)
   • Flat back · Pull elbows back · 10–12 reps
   👉 Improves posture and back strength.

─────────────────────────
🧠 ROUND 3: Core + Conditioning

5. Kettlebell Swings (20 or 35 lb)
   • Hinge, don't squat · Snap hips forward
   • 15–20 reps
   👉 Fat-burning + power move.

6. Plank (Bodyweight)
   • Straight line body · 30–45 seconds

─────────────────────────
🧠 Optional Finisher (5 min)
• 20 KB swings → 10 squats → repeat nonstop

⚡ The real part:
• 3x/week done well > 7x/week half-done
• Push yourself on squats + swings — that's where change happens`
  },
  {
    id:'cardio_hiit',
    emoji:'⚡',
    title:'HIIT Cardio',
    tag:'20–25 min · 3x/week',
    type:'cardio',
    content:`⚡ HIIT Cardio (20–25 min)

Structure: 40 sec on · 20 sec rest · 4 rounds

─────────────────────────
Round 1–4 (repeat):
1. Jump squats — 40 sec
2. High knees — 40 sec
3. Burpees — 40 sec
4. Mountain climbers — 40 sec
5. Jump rope / skip — 40 sec

Rest 90 sec between rounds.

─────────────────────────
Cool down (5 min):
• Hip flexor stretch
• Hamstring stretch
• Deep breathing

👉 Intensity is the point. Go hard on work intervals.`
  },
  {
    id:'upper_body',
    emoji:'💪',
    title:'Upper Body Strength',
    tag:'30 min · 2x/week',
    type:'weights',
    content:`💪 Upper Body Strength (30 min)

Structure: 4 exercises · 3 sets · 10–12 reps

─────────────────────────
1. Push-ups or Chest Press
   • 3 sets · 10–15 reps
   • Slow down, explode up

2. Dumbbell Rows (15–20 lb)
   • 3 sets · 10–12 reps each side
   • Squeeze shoulder blade at top

3. Lateral Raises (8–10 lb)
   • 3 sets · 12–15 reps
   • Slow and controlled

4. Bicep Curls + Tricep Dips
   • 2 sets each · 12 reps
   • Superset — no rest between

─────────────────────────
👉 Focus on the muscle, not the weight.`
  },
  {
    id:'walk_stretch',
    emoji:'🌿',
    title:'Walk + Stretch',
    tag:'30–45 min · Active recovery',
    type:'cardio',
    content:`🌿 Walk + Stretch (Active Recovery)

This is not a rest day — it's active recovery.

─────────────────────────
Walk (20–30 min):
• Outside if possible
• No phone — just walk and breathe
• Brisk pace, not strolling

─────────────────────────
Stretch (15 min):
• Hip flexors — 60 sec each
• Hamstrings — 60 sec each
• Chest opener — 60 sec
• Spinal twist — 60 sec each side
• Child's pose — 90 sec

─────────────────────────
👉 Recovery is when you actually get stronger.
    Don't skip this.`
  },
];

let expandedPlan=null;

function renderExercise(){
  const schedule=DB.exerciseSchedule||{};
  const logs=DB.exercise||[];
  const todayDay=DAYS[new Date().getDay()===0?6:new Date().getDay()-1];
  const todaySchedule=schedule[todayDay]||'';

  const dayPills=DAYS.map(d=>{
    const type=schedule[d]||'';
    const isToday=d===todayDay;
    const label=type?type.charAt(0).toUpperCase()+type.slice(1,4):'—';
    return`<div class="day-pill${type?' '+type:''}${isToday?' active-day':''}" onclick="editDaySchedule('${d}')">
      <div class="day-name">${d}</div>
      <div class="day-type">${label}</div>
    </div>`;
  }).join('');

  // Workout plan cards
  const planCards=WORKOUT_PLANS.map(p=>{
    const isOpen=expandedPlan===p.id;
    return`<div class="plan-card${isOpen?' plan-open':''}" onclick="togglePlan('${p.id}')">
      <div class="plan-card-head">
        <div class="plan-emoji">${p.emoji}</div>
        <div style="flex:1">
          <div class="plan-title">${p.title}</div>
          <div class="plan-tag">${p.tag}</div>
        </div>
        <div class="plan-chevron">${isOpen?'▲':'▼'}</div>
      </div>
      ${isOpen?`<div class="plan-body">${esc(p.content).replace(/\n/g,'<br>')}</div>
        <button class="plan-use-btn" onclick="event.stopPropagation();usePlan('${p.id}')">Use this plan today</button>`:''}
    </div>`;
  }).join('');

  let html=`
    <div class="post">
      <div class="post-header">
        <div class="post-avatar">🗓️</div>
        <div><div class="post-title">Weekly schedule</div><div class="post-sub">Tap a day to set your workout type</div></div>
      </div>
      <div class="post-body">
        <div class="week-grid">${dayPills}</div>
      </div>
    </div>

    <div class="post">
      <div class="post-header">
        <div class="post-avatar">📋</div>
        <div><div class="post-title">Workout plans</div><div class="post-sub">Tap to expand · tap "Use this plan" to log it</div></div>
      </div>
      <div class="post-body">
        <div class="plans-list">${planCards}</div>
      </div>
    </div>

    <div class="post">
      <div class="post-header">
        <div class="post-avatar">💪</div>
        <div><div class="post-title">Today's log</div><div class="post-sub">${todayDay}${todaySchedule?' · '+todaySchedule.charAt(0).toUpperCase()+todaySchedule.slice(1):''}</div></div>
      </div>
      <div class="post-body">
        <textarea class="ta" id="ex_log" placeholder="What did you do today? Log sets, reps, how it felt…" rows="4"></textarea>
        <div style="height:10px"></div>
        <button class="primary-btn" onclick="saveExercise()">Save workout</button>
        <div class="save-confirm" id="exConfirm" style="margin-top:8px">Workout logged ✦</div>
      </div>
    </div>`;

  if(logs.length){
    html+=`<div class="past-label">Past workouts</div>`;
    logs.forEach(e=>{
      html+=`<div class="log-entry">
        <div class="log-date">${fmtShort(e.date)}${e.type?' · '+e.type:''}</div>
        ${e.plan?`<div class="log-text" style="color:var(--purple);font-size:12px;font-weight:600;margin-bottom:4px">${e.plan}</div>`:''}
        <div class="log-text">${esc(e.log||'').replace(/\n/g,'<br>')}</div>
        <div class="log-foot"><button class="del-btn" onclick="deleteExercise('${e.id}')">Delete</button></div>
      </div>`;
    });
  }
  document.getElementById('viewBody').innerHTML=html;
}

function togglePlan(id){
  expandedPlan=expandedPlan===id?null:id;
  renderExercise();
  // Scroll to the opened plan
  setTimeout(()=>{
    const el=document.querySelector('.plan-open');
    if(el)el.scrollIntoView({behavior:'smooth',block:'start'});
  },50);
}

function usePlan(id){
  const plan=WORKOUT_PLANS.find(p=>p.id===id);
  if(!plan)return;
  const ta=document.getElementById('ex_log');
  if(ta){ta.value=plan.content;ta.scrollIntoView({behavior:'smooth'});}
}

function editDaySchedule(day){
  const schedule=DB.exerciseSchedule||{};
  const current=schedule[day]||'';
  const opts=WORKOUT_TYPES.map(t=>`<button class="type-opt${current===t?' sel-'+t:''}" onclick="setDayType('${day}','${t}')">${t.charAt(0).toUpperCase()+t.slice(1)}</button>`).join('');
  openModal(`<div class="modal-handle"></div>
    <div class="modal-title">${day} — workout type</div>
    <div class="type-selector" id="typeSelector">${opts}</div>
    <div class="fg"><label class="lbl">Notes for this day</label>
    <textarea class="mi-ta" id="day_notes" placeholder="e.g. Push day — chest, shoulders, triceps">${esc(schedule[day+'_notes']||'')}</textarea></div>
    <div class="modal-footer">
      <button class="modal-cancel" onclick="closeModal()">Cancel</button>
      <button class="modal-save" onclick="saveDaySchedule('${day}')">Save</button>
    </div>`);
}

function setDayType(day,type){
  document.querySelectorAll('.type-opt').forEach(b=>{
    b.className='type-opt'+(b.textContent.toLowerCase()===type?' sel-'+type:'');
  });
}

function saveDaySchedule(day){
  if(!DB.exerciseSchedule)DB.exerciseSchedule={};
  const selected=document.querySelector('#typeSelector .type-opt[class*="sel-"]');
  if(selected)DB.exerciseSchedule[day]=selected.textContent.toLowerCase();
  DB.exerciseSchedule[day+'_notes']=(document.getElementById('day_notes').value||'').trim();
  saveDB('exerciseSchedule',DB.exerciseSchedule);closeModal();renderExercise();
}

function saveExercise(){
  const log=(document.getElementById('ex_log').value||'').trim();
  if(!log)return;
  if(!DB.exercise)DB.exercise=[];
  const todayDay=DAYS[new Date().getDay()===0?6:new Date().getDay()-1];
  const type=(DB.exerciseSchedule||{})[todayDay]||'';
  DB.exercise.unshift({id:Date.now().toString(),date:today(),type,log});
  saveDB('exercise',DB.exercise);
  const conf=document.getElementById('exConfirm');
  conf.style.opacity='1';setTimeout(()=>{conf.style.opacity='0';renderExercise();},1200);
}

function deleteExercise(id){
  DB.exercise=(DB.exercise||[]).filter(e=>e.id!==id);
  saveDB('exercise',DB.exercise);renderExercise();
}

// ═══════════════ NOURISHMENT ═══════════════
const MEAL_SUGGESTIONS=['Overnight oats','Greek yogurt + berries','Avocado toast','Grilled salmon + greens','Chicken + quinoa','Veggie stir fry','Smoothie bowl','Lentil soup'];

function renderNourish(){
  if(!DB.nourish)DB.nourish={glasses:0,vitamins:{},meals:{breakfast:'',lunch:'',dinner:'',snack:''},vitaminList:[]};
  const n=DB.nourish;
  if(!n.vitaminList)n.vitaminList=[];
  const glasses=n.glasses||0;

  const glassHtml=Array.from({length:8},(_,i)=>`
    <div class="glass${i<glasses?' filled':''}" onclick="toggleGlass(${i})">
      <div class="glass-fill"></div>
    </div>`).join('');

  const vitaminHtml=n.vitaminList.length
    ? n.vitaminList.map((v,i)=>`
      <div class="vitamin-row${n.vitamins[v]?' checked':''}">
        <div style="display:flex;align-items:center;gap:10px;flex:1" onclick="toggleVitamin('${v.replace(/'/g,"\\'")}')">
          <div class="vitamin-check">${n.vitamins[v]?'✓':''}</div>
          <div class="vitamin-name">${esc(v)}</div>
        </div>
        <button onclick="removeVitamin(${i})" style="background:none;border:none;color:var(--ink4);cursor:pointer;font-size:14px;padding:4px 8px;touch-action:manipulation">✕</button>
      </div>`).join('')
    : `<div style="font-size:13px;color:var(--ink4);font-style:italic;padding:8px 0">No vitamins added yet — add yours below</div>`;

  const suggestHtml=MEAL_SUGGESTIONS.map(m=>`<button class="meal-chip" onclick="useMealSuggestion('${m}')">${m}</button>`).join('');

  document.getElementById('viewBody').innerHTML=`
    <div class="post">
      <div class="post-header">
        <div class="post-avatar">💧</div>
        <div><div class="post-title">Water intake</div><div class="post-sub">Tap each glass as you drink it</div></div>
      </div>
      <div class="post-body">
        <div class="water-tracker">${glassHtml}</div>
        <div class="water-count">${glasses} of 8 glasses · ${glasses*8} oz</div>
      </div>
    </div>

    <div class="post">
      <div class="post-header">
        <div class="post-avatar">💊</div>

function saveRecipe(){
  const name=(document.getElementById('recipe_name').value||'').trim();if(!name)return;
  const notes=(document.getElementById('recipe_notes').value||'').trim();
  if(!DB.nourish)DB.nourish={glasses:0,vitamins:{},meals:{},vitaminList:[],recipes:[],foodPrep:''};
  if(!DB.nourish.recipes)DB.nourish.recipes=[];
  DB.nourish.recipes.unshift({name,notes,id:Date.now().toString()});
  saveDB('nourish',DB.nourish);
  const conf=document.getElementById('recipeConfirm');
  if(conf){conf.style.opacity='1';setTimeout(()=>{conf.style.opacity='0';renderNourish();},1200);}
}
function deleteRecipe(i){
  if(!DB.nourish||!DB.nourish.recipes)return;
  DB.nourish.recipes.splice(i,1);
  saveDB('nourish',DB.nourish);renderNourish();
}
function addRecipeToMeal(name){
  // Add to the first empty meal slot
  const slots=['breakfast','lunch','dinner','snack'];
  for(const s of slots){
    const el=document.getElementById('meal_'+s);
    if(el&&!el.value){el.value=name;el.style.background='#f5f0ff';break;}
  }
}
function saveFoodPrep(){
  const text=(document.getElementById('food_prep').value||'').trim();
  if(!DB.nourish)DB.nourish={glasses:0,vitamins:{},meals:{},vitaminList:[],recipes:[],foodPrep:''};
  DB.nourish.foodPrep=text;
  saveDB('nourish',DB.nourish);
  const conf=document.getElementById('prepConfirm');
  if(conf){conf.style.opacity='1';setTimeout(()=>{conf.style.opacity='0';},1400);}
}

function removeVitamin(i){
  if(!DB.nourish||!DB.nourish.vitaminList)return;
  const name=DB.nourish.vitaminList[i];
  DB.nourish.vitaminList.splice(i,1);
  delete DB.nourish.vitamins[name];
  saveDB('nourish',DB.nourish);renderNourish();
}

function toggleGlass(i){
  if(!DB.nourish)DB.nourish={glasses:0,vitamins:{},meals:{},vitaminList:[]};
  const current=DB.nourish.glasses||0;
  DB.nourish.glasses=i<current?i:i+1;
  saveDB('nourish',DB.nourish);renderNourish();
}

function toggleVitamin(name){
  if(!DB.nourish)DB.nourish={glasses:0,vitamins:{},meals:{},vitaminList:[]};
  DB.nourish.vitamins[name]=!DB.nourish.vitamins[name];
  saveDB('nourish',DB.nourish);renderNourish();
}

function addVitamin(){
  const inp=document.getElementById('vitaminInp');
  const val=(inp.value||'').trim();if(!val)return;
  if(!DB.nourish)DB.nourish={glasses:0,vitamins:{},meals:{},vitaminList:[]};
  if(!DB.nourish.vitaminList)DB.nourish.vitaminList=[];
  if(!DB.nourish.vitaminList.includes(val)){DB.nourish.vitaminList.push(val);saveDB('nourish',DB.nourish);}
  inp.value='';renderNourish();
}

function useMealSuggestion(meal){
  const slots=['breakfast','lunch','dinner','snack'];
  for(const s of slots){
    const el=document.getElementById('meal_'+s);
    if(el&&!el.value){el.value=meal;break;}
  }
}

function saveMeals(){
  if(!DB.nourish)DB.nourish={glasses:0,vitamins:{},meals:{},vitaminList:[]};
  DB.nourish.meals={
    breakfast:(document.getElementById('meal_breakfast').value||'').trim(),
    lunch:(document.getElementById('meal_lunch').value||'').trim(),
    dinner:(document.getElementById('meal_dinner').value||'').trim(),
    snack:(document.getElementById('meal_snack').value||'').trim(),
  };
  saveDB('nourish',DB.nourish);
  const conf=document.getElementById('nourishConfirm');
  conf.style.opacity='1';setTimeout(()=>{conf.style.opacity='0';},1400);
}

// ═══════════════ FINANCIAL ═══════════════
const SPEND_CATS=['Food','Transport','Shopping','Health','Entertainment','Other'];

function initFinancial(){
  if(!DB.financial)DB.financial={savings:{goal:0,saved:0},desire:{item:'',cost:0,saved:0},spending:{}};
  if(!DB.financial.savings)DB.financial.savings={goal:0,saved:0};
  if(!DB.financial.desire)DB.financial.desire={item:'',cost:0,saved:0};
  if(!DB.financial.spending)DB.financial.spending={};
}

function renderFinancial(){
  initFinancial();
  const f=DB.financial;
  const savingsPct=f.savings.goal>0?Math.min(100,Math.round((f.savings.saved/f.savings.goal)*100)):0;
  const desirePct=f.desire.cost>0?Math.min(100,Math.round((f.desire.saved/f.desire.cost)*100)):0;

            <span>Goal: <strong>$${(parseFloat(f.savings.goal)||0).toLocaleString()}</strong></span>
          </div>
          <div class="savings-progress-bar"><div class="savings-progress-fill" style="width:${savingsPct}%"></div></div>
          <div style="text-align:right;font-size:12px;color:var(--purple);font-weight:700;margin-bottom:14px">${savingsPct}%</div>
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px">
            <div>
              <div style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--ink3);margin-bottom:4px">Set goal</div>
              <input class="cat-add-inp" style="width:100%" type="number" min="0" placeholder="$5,000" id="savings_goal" value="${parseFloat(f.savings.goal)||''}">
            </div>
            <div>
              <div style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--ink3);margin-bottom:4px">Add amount</div>
              <input class="cat-add-inp" style="width:100%" type="number" min="0" placeholder="$200" id="savings_add">
            </div>
          </div>
          <button class="primary-btn" onclick="updateSavings()">Update savings</button>
          <div class="save-confirm" id="savingsConfirm" style="margin-top:8px">Saved ✦</div>
        </div>
      </div>
    </div>

    <div class="post">
      <div class="post-header">
        <div class="post-avatar">✨</div>
        <div><div class="post-title">Desire goal</div><div class="post-sub">Something beautiful you're working toward</div></div>
      </div>
      <div class="post-body">
        <div class="desire-card">
          <div class="desire-label">I am saving for…</div>
          <input class="cat-add-inp" style="width:100%;margin-bottom:12px" placeholder="e.g. dream vacation, new car, handbag…" id="desire_item" value="${esc(f.desire.item||'')}">

            <span>Cost: <strong>$${(parseFloat(f.desire.cost)||0).toLocaleString()}</strong></span>

          <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px">
            <div>
              <div style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--ink3);margin-bottom:4px">Total cost</div>

            </div>
            <div>
              <div style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--ink3);margin-bottom:4px">Add amount</div>

function updateSavings(){
  initFinancial();
  const goalEl=document.getElementById('savings_goal');
  const addEl=document.getElementById('savings_add');
  const goal=parseFloat(goalEl.value)||DB.financial.savings.goal||0;
  const add=parseFloat(addEl.value)||0;
  DB.financial.savings.goal=goal;
  DB.financial.savings.saved=(parseFloat(DB.financial.savings.saved)||0)+add;
  saveDB('financial',DB.financial);
  const conf=document.getElementById('savingsConfirm');
  conf.style.opacity='1';setTimeout(()=>{conf.style.opacity='0';renderFinancial();},1200);
}

function updateDesire(){
  initFinancial();
  const item=(document.getElementById('desire_item').value||'').trim();
  const cost=parseFloat(document.getElementById('desire_cost').value)||DB.financial.desire.cost||0;
  const add=parseFloat(document.getElementById('desire_add').value)||0;
  DB.financial.desire.item=item;
  DB.financial.desire.cost=cost;
  DB.financial.desire.saved=(parseFloat(DB.financial.desire.saved)||0)+add;
  saveDB('financial',DB.financial);
  const conf=document.getElementById('desireConfirm');
  conf.style.opacity='1';setTimeout(()=>{conf.style.opacity='0';renderFinancial();},1200);
}

function addSpend(cat){
  initFinancial();
  const inp=document.getElementById('spend_'+cat);
  const val=parseFloat(inp.value)||0;
  if(!val)return;
  DB.financial.spending[cat]=(parseFloat(DB.financial.spending[cat])||0)+val;
  saveDB('financial',DB.financial);inp.value='';renderFinancial();
}

function resetSpending(){
  initFinancial();
  DB.financial.spending={};
  saveDB('financial',DB.financial);renderFinancial();
}


// ═══════════════ EMOTIONAL TRACKER ═══════════════
const MOODS=[
  {emoji:'😄',label:'Great'},
  {emoji:'🙂',label:'Good'},
  {emoji:'😐',label:'Okay'},
  {emoji:'😔',label:'Low'},
  {emoji:'😤',label:'Frustrated'},
  {emoji:'😰',label:'Anxious'},
  {emoji:'😴',label:'Drained'},
  {emoji:'🤩',label:'Excited'},
];

let selectedMood=null;
let emotionalEnergy=0;

function renderEmotional(){
  selectedMood=null;emotionalEnergy=0;
  const entries=DB.emotional||[];

  const moodHtml=MOODS.map(m=>`
    <div class="mood-btn" id="mood_${m.label}" onclick="selectMood('${m.label}','${m.emoji}')">
      <div class="mood-emoji">${m.emoji}</div>
      <div class="mood-label">${m.label}</div>
    </div>`).join('');

  let html=`
    <div class="post">
      <div class="post-header">
        <div class="post-avatar">💜</div>
        <div><div class="post-title">Emotional check-in</div><div class="post-sub">How are you really doing today?</div></div>
      </div>
      <div class="post-body">

        <div class="block-label" style="margin-bottom:8px">Mood</div>
        <div class="mood-grid">${moodHtml}</div>

        <div style="height:16px"></div>
        <div class="block-label" style="margin-bottom:8px">Energy level (1–10)</div>
        <div class="energy-dots" id="energyDots">${energyDotsHtml(0)}</div>

        <div style="height:16px"></div>
        <div class="mindset-block">
          <div class="mindset-prompt">What's bothering you?</div>
          <div class="mindset-prefix">The problem or challenge on my mind…</div>
          <textarea class="ta" id="em_problem" placeholder="Be honest — what's weighing on you?" rows="2"></textarea>
        </div>

        <div style="height:10px"></div>
        <div class="mindset-block">
          <div class="mindset-prompt">What's actually true?</div>
          <div class="mindset-prefix">Separate the story from the facts…</div>
          <textarea class="ta" id="em_lesson" placeholder="When I strip away the fear, what's really true here?" rows="2"></textarea>
        </div>

        <div style="height:10px"></div>
        <div class="mindset-block" style="background:var(--purple-bg)">
          <div class="mindset-prompt" style="color:var(--purple)">How can I reframe it or take action?</div>
          <div class="mindset-prefix">One thing I can think, say, or do differently…</div>
          <textarea class="ta" id="em_excited" placeholder="I can choose to see this as… or I can take the step of…" rows="2"></textarea>
        </div>

        <div style="height:10px"></div>
        <div class="mindset-block" style="background:#f0f7f0;border-left:3px solid #6b8f6b">
          <div class="mindset-prompt" style="color:#4a6b4a">Tune in — what do you need today?</div>
          <div class="mindset-prefix">My soul is asking for…</div>
          <textarea class="ta" id="em_need" placeholder="Rest? Connection? Movement? Silence? Fun?" rows="2"></textarea>
        </div>

        <div style="height:14px"></div>
        <button class="primary-btn" onclick="saveEmotional()">Save check-in</button>
        <div class="save-confirm" id="emConfirm" style="margin-top:8px">You matter ✦</div>
      </div>
    </div>`;

  if(entries.length){
    html+=`<div class="past-label">Past check-ins</div>`;
    entries.forEach(e=>{
      html+=`<div class="log-entry">
        <div class="log-date">${fmtShort(e.date)}${e.mood?' · '+e.moodEmoji+' '+e.mood:''} ${e.energy?' · ⚡'+e.energy+'/10':''}</div>
        ${e.problem?`<div style="margin-bottom:6px"><div style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--ink4);margin-bottom:2px">Challenge</div><div class="log-text">${esc(e.problem)}</div></div>`:''}
        ${e.lesson?`<div style="margin-bottom:6px"><div style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--ink4);margin-bottom:2px">Lesson</div><div class="log-text">${esc(e.lesson)}</div></div>`:''}
        ${e.excited?`<div style="margin-bottom:6px"><div style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--purple);margin-bottom:2px">Excited about</div><div class="log-text">${esc(e.excited)}</div></div>`:''}
        ${e.need?`<div><div style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:#6b8f6b;margin-bottom:2px">I need</div><div class="log-text">${esc(e.need)}</div></div>`:''}
        <div class="log-foot"><button class="del-btn" onclick="deleteEmotional('${e.id}')">Delete</button></div>
      </div>`;
    });
  }
  document.getElementById('viewBody').innerHTML=html;
}

function energyDotsHtml(selected){
  return Array.from({length:10},(_,i)=>i+1).map(n=>
    `<div class="e-dot${selected===n?' e-dot-sel':''}" onclick="setEmotionalEnergy(${n})">${n}</div>`
  ).join('');
}

function setEmotionalEnergy(val){
  emotionalEnergy=val;
  const el=document.getElementById('energyDots');
  if(el)el.innerHTML=energyDotsHtml(val);
}

function selectMood(label,emoji){
  selectedMood={label,emoji};
  document.querySelectorAll('.mood-btn').forEach(b=>{
    b.classList.toggle('mood-sel',b.id==='mood_'+label);
  });
}

function saveEmotional(){
  const problem=(document.getElementById('em_problem').value||'').trim();
  const lesson=(document.getElementById('em_lesson').value||'').trim();
  const excited=(document.getElementById('em_excited').value||'').trim();
  const need=(document.getElementById('em_need').value||'').trim();
  if(!problem&&!lesson&&!excited&&!need&&!selectedMood&&!emotionalEnergy)return;
  if(!DB.emotional)DB.emotional=[];
  DB.emotional.unshift({
    id:Date.now().toString(),date:today(),
    mood:selectedMood?selectedMood.label:'',
    moodEmoji:selectedMood?selectedMood.emoji:'',
    energy:emotionalEnergy||'',
    problem,lesson,excited,need
  });
  saveDB('emotional',DB.emotional);
  const conf=document.getElementById('emConfirm');
  conf.style.opacity='1';setTimeout(()=>{conf.style.opacity='0';renderEmotional();},1400);
}

function deleteEmotional(id){
  DB.emotional=(DB.emotional||[]).filter(e=>e.id!==id);
  saveDB('emotional',DB.emotional);renderEmotional();
}

// Rotate 3 messages per day based on day of year
function getTodaysMessages(){
  const day=Math.floor((new Date()-new Date(new Date().getFullYear(),0,0))/(864e5));
  const total=KIND_MESSAGES.length;
  const i1=day%total;
  const i2=(day+Math.floor(total/3))%total;
  const i3=(day+Math.floor(2*total/3))%total;
  return[i1,i2,i3].map(i=>({...KIND_MESSAGES[i],origIndex:i}));
}

    ${cards}
    <button class="modal-cancel" onclick="closeModal()" style="width:100%;margin-top:8px">Close</button>`);
}

function sendKindByIndex(method,index,name){
  const m=KIND_MESSAGES[index];
  if(!m)return;
  sendKind(method,m.text,name||m.type);
}

function sendKind(method,text,subject){
  // text comes directly from the JS array — no HTML encoding issues
  if(method==='sms'){
    window.location.href='sms:&body='+encodeURIComponent(text);
  } else if(method==='email'){
    window.location.href='mailto:?subject='+encodeURIComponent('Hey — thinking of you')+'&body='+encodeURIComponent(text);
  } else {
    if(navigator.clipboard&&window.isSecureContext){
      navigator.clipboard.writeText(text).then(()=>showCopyToast()).catch(()=>fallbackCopy(text));
    } else {
      fallbackCopy(text);
    }
  }
}

function fallbackCopy(text){
  const ta=document.createElement('textarea');
  ta.value=text;
  ta.style.cssText='position:fixed;left:-9999px;top:50%;opacity:0';
  document.body.appendChild(ta);
  ta.focus();ta.select();
  try{document.execCommand('copy');showCopyToast();}catch(e){alert('Tap and hold to copy:\n\n'+text);}
  document.body.removeChild(ta);
}

function showCopyToast(){
  let t=document.getElementById('copyToast');
  if(!t){
    t=document.createElement('div');t.id='copyToast';
    t.style.cssText='position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:#111;color:#fff;padding:10px 20px;border-radius:99px;font-size:13px;font-weight:600;z-index:9999;font-family:Plus Jakarta Sans,sans-serif;pointer-events:none;transition:opacity .3s;opacity:0';
    t.textContent='Copied to clipboard ✓';
    document.body.appendChild(t);
  }
  t.style.opacity='1';
  setTimeout(()=>{t.style.opacity='0';},2200);
}

async function renderInspire(){
  const day=Math.floor((new Date()-new Date(new Date().getFullYear(),0,0))/(864e5));
  // Always show today's daily quote immediately, then try to fetch a fresh one
  if(!currentQuote){
    currentQuote=FALLBACK[day%FALLBACK.length];
  }
  showQuote();
  // Try to fetch a fresh one in the background
  fetchQuote().then(()=>showQuote()).catch(()=>{});
}

async function fetchQuote(){
  try{
    const r=await fetch('https://api.quotable.io/random?tags=inspirational,motivational,success,life&maxLength=160');
    if(r.ok){const d=await r.json();currentQuote={text:d.content,author:d.author};}
    else throw new Error();
  }catch(e){
    const day=Math.floor((new Date()-new Date(new Date().getFullYear(),0,0))/(864e5));
    currentQuote=FALLBACK[day%FALLBACK.length];
  }
}

function showQuote(){
  const quoteText=`"${currentQuote.text}" — ${currentQuote.author}`;
  document.getElementById('viewBody').innerHTML=`
    <div class="quote-wrap">
      <div class="quote-card">
        <div class="quote-mark">"</div>
        <div class="quote-text">${esc(currentQuote.text)}</div>
        <div class="quote-author">— ${esc(currentQuote.author)}</div>
      </div>
      <div style="display:flex;gap:8px;margin-bottom:16px;justify-content:center">
        <button onclick="shareQuote('sms')" style="flex:1;max-width:120px;padding:11px 8px;font-size:12px;font-weight:700;font-family:'Plus Jakarta Sans',sans-serif;background:#f5f0ff;color:var(--purple);border:1.5px solid var(--purple-mid);border-radius:12px;cursor:pointer;touch-action:manipulation">💬 Text</button>
        <button onclick="shareQuote('email')" style="flex:1;max-width:120px;padding:11px 8px;font-size:12px;font-weight:700;font-family:'Plus Jakarta Sans',sans-serif;background:#f5f0ff;color:var(--purple);border:1.5px solid var(--purple-mid);border-radius:12px;cursor:pointer;touch-action:manipulation">📧 Email</button>
        <button onclick="shareQuote('copy')" style="flex:1;max-width:120px;padding:11px 8px;font-size:12px;font-weight:700;font-family:'Plus Jakarta Sans',sans-serif;background:#f5f0ff;color:var(--purple);border:1.5px solid var(--purple-mid);border-radius:12px;cursor:pointer;touch-action:manipulation">📋 Copy</button>
      </div>
      <button class="new-quote-btn" onclick="newQuote()">✦ New quote</button>
    </div>`;
}

function shareQuote(method){
  const text=`"${currentQuote.text}" — ${currentQuote.author}`;
  if(method==='sms'){
    window.location.href='sms:&body='+encodeURIComponent(text);
  } else if(method==='email'){
    window.location.href='mailto:?subject='+encodeURIComponent('Thought you might like this')+
      '&body='+encodeURIComponent(text+'\n\nSent from daily. — live by design.');
  } else {
    if(navigator.clipboard&&window.isSecureContext){
      navigator.clipboard.writeText(text).then(()=>showCopyToast()).catch(()=>fallbackCopy(text));
    } else {
      fallbackCopy(text);
    }
  }
}

async function newQuote(){
  currentQuote=null;
  await fetchQuote();
  showQuote();
}

// Modal
function openModal(html){
  let ov=document.getElementById('modal-overlay');
  if(!ov){
    ov=document.createElement('div');
    ov.id='modal-overlay';
    ov.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:300;display:flex;align-items:flex-end;justify-content:center';
    ov.innerHTML='<div id="modal-box" style="background:#fff;border-radius:18px 18px 0 0;padding:24px 20px 40px;width:100%;max-width:600px;max-height:90vh;overflow-y:auto"></div>';
    ov.addEventListener('click',e=>{if(e.target===ov)closeModal()});
    document.body.appendChild(ov);
  }
  document.getElementById('modal-box').innerHTML=html;
  ov.style.display='flex';
}
function closeModal(){
  const ov=document.getElementById('modal-overlay');
  if(ov)ov.style.display='none';
}
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeModal()});

(function(){
  function makeIcon(size){
    const svg=`<svg xmlns="http://www.w3.org/2000/svg" width="${size}" height="${size}" viewBox="0 0 ${size} ${size}">
      <rect width="${size}" height="${size}" fill="#ffffff"/>
      <text x="50%" y="44%" dominant-baseline="middle" text-anchor="middle"
        font-family="sans-serif" font-size="${Math.round(size*0.38)}px" font-weight="800" fill="#111111" letter-spacing="-2">daily</text>
      <text x="${Math.round(size*0.86)}%" y="44%" dominant-baseline="middle" text-anchor="middle"
        font-family="sans-serif" font-size="${Math.round(size*0.42)}px" font-weight="800" fill="#7c4dbe">.</text>
      <text x="50%" y="68%" dominant-baseline="middle" text-anchor="middle"
        font-family="sans-serif" font-size="${Math.round(size*0.12)}px" font-weight="400" fill="#737373" letter-spacing="1">live by design</text>
    </svg>`;
    return 'data:image/svg+xml;base64,'+btoa(svg);
  }
  document.getElementById('appIcon').href=makeIcon(180);
  const manifest={name:'daily.',short_name:'daily.',description:'live by design.',start_url:'./',display:'standalone',background_color:'#ffffff',theme_color:'#ffffff',orientation:'portrait',icons:[{src:makeIcon(192),sizes:'192x192',type:'image/svg+xml'},{src:makeIcon(512),sizes:'512x512',type:'image/svg+xml'}]};
  const blob=new Blob([JSON.stringify(manifest)],{type:'application/json'});
  document.getElementById('appManifest').href=URL.createObjectURL(blob);
})();
